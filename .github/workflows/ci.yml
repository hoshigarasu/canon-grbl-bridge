name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # rs274ngc (linuxcnc-uspace) は CI に無いが canon.py は不在時に縮退する。
          # pyserial は serial_io がトップレベル import するため必要（実機接続はしない）。
          pip install fastapi uvicorn websockets pyserial pytest pytest-asyncio ruff

      - name: Ruff lint
        run: ruff check gateway/ tests/

      - name: Pytest
        run: pytest -q
